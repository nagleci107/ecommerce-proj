<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./styles.css">

</head>
<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
            <img src="./assets/Library.svg" alt="Library logo" class="logo">
            <ul class="nav__links">
                <li><a href="#" class="nav__link">Home</a></li>
                <li><a href="#contact" class="nav__link">Contact</a></li>
                <li><a href="#books" class="nav__link nav__link--primary">Books</a></li>
            </ul>
            </div>
        </nav>
        <header>
            <div class="header__container">
                <div class="header__desc">
                    <h1>America's most awarded online library platform</h1>
                    <h2>Find your dream book with <span class="text--purple">Library</span></h2>
                    <button class="btn">Browse books</button>
                </div>
                <figure class="header__img--wrapper">
                    <img src="./assets/Undraw_Books.svg" alt="illustration of woman reading on top of a stack of books">
                </figure>
            </div>
        </header>
    </section>
</body>
</html>
